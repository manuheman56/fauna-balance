<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fauna balance</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .bg-landscape { background: linear-gradient(to bottom, #f0fdf4, #eff6ff); }
        .card-fauna { border: 2px solid #fbbf24; transition: transform 0.2s; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-landscape p-4 text-slate-900 min-h-screen">

    <!-- PORTADA E INICIO -->
    <div id="welcome-screen" class="fixed inset-0 z-50 bg-landscape flex flex-col items-center justify-center p-6 text-center">
        <img src="assets/portada.png" alt="Fauna balance Portada" class="w-64 mb-8 drop-shadow-2xl rounded-3xl">
        <h1 class="text-4xl font-black text-slate-800 tracking-tighter uppercase italic mb-2">Fauna balance</h1>
        <p class="text-slate-600 mb-8 font-medium italic">Selecciona el número de jugadores</p>
        <div class="grid grid-cols-2 gap-4 w-full max-w-xs">
            <button onclick="startGame(1)" class="bg-white py-4 rounded-2xl shadow-md font-bold text-slate-700 border-2 border-transparent hover:border-amber-400">1 Jugador</button>
            <button onclick="startGame(2)" class="bg-white py-4 rounded-2xl shadow-md font-bold text-slate-700 border-2 border-transparent hover:border-amber-400">2 Jugadores</button>
            <button onclick="startGame(3)" class="bg-white py-4 rounded-2xl shadow-md font-bold text-slate-700 border-2 border-transparent hover:border-amber-400">3 Jugadores</button>
            <button onclick="startGame(4)" class="bg-white py-4 rounded-2xl shadow-md font-bold text-slate-700 border-2 border-transparent hover:border-amber-400">4 Jugadores</button>
        </div>
    </div>

    <!-- APLICACIÓN PRINCIPAL -->
    <div id="main-app" class="hidden max-w-md mx-auto bg-white/90 backdrop-blur-md rounded-3xl shadow-2xl p-6 border border-white">
        <header class="text-center mb-6">
            <div id="display-players" class="text-[10px] font-bold text-amber-600 uppercase tracking-widest bg-amber-50 inline-block px-3 py-1 rounded-full mb-2"></div>
            <h1 class="text-3xl font-black text-slate-800 tracking-tighter uppercase italic">Fauna balance</h1>
            <button id="btn-soles" onclick="toggleSolesTable()" class="hidden mt-2 text-[10px] bg-amber-400 text-white px-2 py-1 rounded-lg font-bold uppercase shadow-sm mx-auto block">☀️ Ver Tabla de Soles</button>
        </header>

        <!-- 1. PAISAJES -->
        <div class="space-y-4 mb-8">
            <h2 class="text-xs font-black text-slate-400 uppercase tracking-widest border-b pb-1">1. Paisajes Naturales</h2>
            <section class="grid grid-cols-2 gap-4">
                <div class="p-3 bg-green-100 rounded-2xl border border-green-200">
                    <label class="block text-[10px] font-bold text-green-700 uppercase mb-1 text-center">🌲 Árboles</label>
                    <input id="trees1" type="number" placeholder="T1" class="w-full p-2 rounded-lg text-sm mb-1 border-none shadow-inner">
                    <input id="trees2" type="number" placeholder="T2" class="w-full p-2 rounded-lg text-sm mb-1 border-none shadow-inner">
                    <input id="trees3" type="number" placeholder="T3" class="w-full p-2 rounded-lg text-sm border-none shadow-inner">
                </div>
                <div class="p-3 bg-slate-100 rounded-2xl border border-slate-200">
                    <label class="block text-[10px] font-bold text-slate-700 uppercase mb-1 text-center">⛰️ Montañas Ady.</label>
                    <input id="mnt2" type="number" placeholder="H2" class="w-full p-2 rounded-lg text-sm mb-1 border-none shadow-inner">
                    <input id="mnt3" type="number" placeholder="H3" class="w-full p-2 rounded-lg text-sm border-none shadow-inner">
                </div>
            </section>
            <section class="grid grid-cols-2 gap-4">
                <div class="p-3 bg-yellow-100 rounded-2xl border border-yellow-200">
                    <label class="block text-[10px] font-bold text-yellow-700 uppercase mb-1 text-center">🌾 Prados (2+)</label>
                    <input id="fields" type="number" placeholder="Grupos" class="w-full p-2 rounded-lg text-sm border-none shadow-inner">
                </div>
                <div class="p-3 bg-red-100 rounded-2xl border border-red-200">
                    <label class="block text-[10px] font-bold text-red-700 uppercase mb-1 text-center">🏠 Edif. Válidos</label>
                    <input id="buildings" type="number" placeholder="3+ colores" class="w-full p-2 rounded-lg text-sm border-none shadow-inner">
                </div>
            </section>
            <section class="p-3 bg-blue-100 rounded-2xl border border-blue-200">
                <label class="block text-[10px] font-bold text-blue-700 uppercase mb-2">💧 Agua y Ríos</label>
                <div class="flex gap-2">
                    <select id="water-mode" class="w-1/2 p-2 rounded-lg text-xs border-none shadow-sm font-bold">
                        <option value="A">Lado A: Río</option>
                        <option value="B">Lado B: Islas</option>
                    </select>
                    <input id="water-val" type="number" placeholder="Fichas" class="w-1/2 p-2 rounded-lg text-sm border-none shadow-inner">
                </div>
            </section>
        </div>

        <!-- 2. FAUNA -->
        <div class="mb-8">
            <h2 class="text-xs font-black text-slate-400 uppercase tracking-widest border-b pb-1 mb-4">2. Especies de Fauna (9 cartas)</h2>
            <div class="grid grid-cols-3 gap-3" id="fauna-container"></div>
        </div>

        <!-- 3. ESPÍRITUS -->
        <div class="mb-8 p-4 bg-purple-100 rounded-3xl border border-purple-200">
            <h2 class="text-[10px] font-black text-purple-700 uppercase tracking-widest mb-3 flex items-center">✨ Espíritu de la Naturaleza</h2>
            <div class="flex items-center justify-between mb-3">
                <span class="text-[10px] font-bold text-purple-800 uppercase italic">¿Cubo colocado?</span>
                <input type="checkbox" id="spirit-check" class="w-5 h-5 accent-purple-600">
            </div>
            <input id="spirit-pts" type="number" placeholder="Suma adicional" class="w-full p-3 rounded-xl text-sm border-none shadow-sm">
        </div>

        <button onclick="calculateScore()" class="w-full bg-slate-800 text-white font-black py-5 rounded-3xl shadow-xl active:scale-95 transition-all uppercase tracking-widest">Confirmar Puntuación</button>

        <!-- RESULTADO Y RANKING -->
        <div id="result" class="mt-8 p-6 bg-slate-900 rounded-3xl text-center hidden border-4 border-amber-400 shadow-2xl">
            <!-- Se llena dinámicamente -->
        </div>
    </div>

    <!-- MODAL DE SOLES (MODO SOLITARIO) -->
    <div id="soles-modal" class="hidden fixed inset-0 z- bg-black/80 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-3xl p-6 w-full max-w-xs text-center shadow-2xl border-4 border-amber-400">
            <h2 class="text-xl font-black mb-4 uppercase italic">Rango de Soles ☀️</h2>
            <div class="text-left text-sm space-y-1 border-y py-4 mb-4 font-bold">
                <div class="flex justify-between"><span>40+ pts</span> <span>☀️</span></div>
                <div class="flex justify-between font-black text-amber-500"><span>160+ pts</span> <span>☀️☀️☀️☀️☀️☀️☀️☀️</span></div>
            </div>
            <p class="text-[9px] text-slate-500 mb-4 font-bold">BONUS: Lado A (+1☀️) | Espíritu (+1☀️)</p>
            <button onclick="toggleSolesTable()" class="bg-slate-800 text-white px-6 py-2 rounded-xl font-bold uppercase text-xs">Cerrar</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
